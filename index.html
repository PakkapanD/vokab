<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#4f46e5" />
<title>Vokab — learn words by their links</title>
<style>
  :root{
    --bg:#0f1220; --card:#1a1f35; --card2:#232a45; --ink:#eef1ff; --muted:#9aa3c7;
    --accent:#7c83ff; --good:#34d399; --easy:#22d3ee; --again:#fb7185; --line:#2c3358;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  header{
    padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;background:linear-gradient(var(--bg),rgba(15,18,32,.85));backdrop-filter:blur(6px);z-index:5;
  }
  header h1{font-size:20px;margin:0;letter-spacing:.5px}
  header h1 span{color:var(--accent)}
  .stats{font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
  main{flex:1;padding:8px 16px 90px}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  .word{font-size:34px;font-weight:700;letter-spacing:.3px}
  .pos{font-size:13px;color:var(--muted);font-style:italic;margin-top:2px}
  .pron{font-size:14px;color:var(--accent);margin-top:4px;cursor:pointer;display:inline-block}
  .def{margin-top:14px;font-size:17px;line-height:1.5}
  .hidden{display:none}

  .reveal-hint{margin-top:18px;color:var(--muted);font-size:14px;text-align:center}

  .web{margin-top:18px}
  .web h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:14px 0 8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    background:var(--card2);border:1px solid var(--line);color:var(--ink);
    padding:6px 11px;border-radius:999px;font-size:13px;cursor:pointer;
  }
  .chip.syn{border-color:#3b6}
  .chip.ant{border-color:#b55}
  .chip.col{border-color:#46c}
  .chip:active{transform:scale(.96)}
  .root{background:var(--card2);border:1px dashed var(--accent);border-radius:12px;padding:10px 12px;margin-top:6px;font-size:14px;line-height:1.5}
  .root b{color:var(--accent)}

  .practice{margin-top:18px}
  .practice textarea{
    width:100%;min-height:70px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:12px;padding:10px;font-size:15px;resize:vertical;font-family:inherit;
  }
  .row{display:flex;gap:8px;margin-top:10px}
  button.act{
    flex:1;border:none;border-radius:12px;padding:13px 0;font-size:15px;font-weight:600;color:#0c1024;cursor:pointer;
  }
  .b-again{background:var(--again)} .b-good{background:var(--good)} .b-easy{background:var(--easy)}
  .b-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .b-show{background:var(--accent);color:#0c1024}

  .small{font-size:12px;color:var(--muted)}
  .loading{color:var(--muted);font-size:13px}

  .done{text-align:center;padding:50px 20px}
  .done .big{font-size:46px}
  .done p{color:var(--muted)}

  nav{
    position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;
    display:flex;background:var(--card);border-top:1px solid var(--line);
  }
  nav button{
    flex:1;background:none;border:none;color:var(--muted);padding:12px 0 14px;font-size:12px;cursor:pointer;
  }
  nav button.on{color:var(--accent)}
  nav button .ic{display:block;font-size:20px;margin-bottom:2px}

  .listitem{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line)}
  .listitem .due{font-size:12px;color:var(--muted)}
  .addbar{display:flex;gap:8px;margin:6px 0 14px}
  .addbar input{flex:1;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:15px}
  .addbar button{background:var(--accent);color:#0c1024;border:none;border-radius:10px;padding:0 16px;font-weight:600;cursor:pointer}
  .tag{font-size:11px;padding:2px 7px;border-radius:6px;background:var(--card2);color:var(--muted);margin-left:6px}

  /* ----- word-web graph (Web tab) ----- */
  .webwrap{position:relative;margin:-8px -16px 0;height:calc(100vh - 168px);min-height:360px;overflow:hidden;
    background:radial-gradient(circle at 50% 38%, #151b33, var(--bg));border-bottom:1px solid var(--line)}
  canvas#net{display:block;width:100%;height:100%;touch-action:none}
  .webhint{position:absolute;bottom:8px;left:0;right:0;text-align:center;pointer-events:none;color:var(--muted);font-size:11px}
  .legend{position:absolute;top:8px;left:10px;font-size:11px;color:var(--muted);line-height:1.8;pointer-events:none}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .netbtns{position:absolute;top:8px;right:10px;display:flex;flex-direction:column;gap:6px}
  .netbtns button{width:36px;height:36px;border-radius:10px;background:var(--card2);color:var(--ink);
    border:1px solid var(--line);font-size:18px;cursor:pointer;line-height:1}
  .netpanel{position:absolute;left:10px;right:10px;bottom:26px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:12px 14px 14px;box-shadow:0 12px 34px rgba(0,0,0,.5)}
  .netpanel .w{font-size:21px;font-weight:700}
  .netpanel .p{font-size:12px;color:var(--muted);font-style:italic}
  .netpanel .d{font-size:14px;margin-top:5px;line-height:1.45}
  .netpanel .x{position:absolute;top:7px;right:13px;cursor:pointer;color:var(--muted);font-size:18px}
  .netpanel .go{margin-top:11px;background:var(--accent);color:#0c1024;border:none;border-radius:10px;
    padding:8px 15px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Vo<span>kab</span></h1>
    <div class="stats" id="stats"></div>
  </header>

  <main id="main"></main>

  <nav>
    <button id="nav-study" class="on" onclick="go('study')"><span class="ic">🎯</span>Study</button>
    <button id="nav-web" onclick="go('web')"><span class="ic">🕸️</span>Web</button>
    <button id="nav-browse" onclick="go('browse')"><span class="ic">📚</span>Words</button>
    <button id="nav-add" onclick="go('add')"><span class="ic">➕</span>Add</button>
  </nav>
</div>

<script>
/* ----------------------------------------------------------

   Method: links (synonyms/antonyms/collocations/roots)
           + active recall + spaced repetition + your own sentences
   Storage: localStorage (fully on-device)
   Online bonus: Datamuse API for the live "word web" (free, no key)
-----------------------------------------------------------*/

// ---------- seed deck (edit / add your own in the Add tab) ----------

// ---------- word packs (tap to load in the Add tab) ----------

 {w:"hackneyed",pos:"adj",def:"overused and therefore unoriginal; clichéd",root:"from <b>hackney</b> = a horse for hire (worn out from overuse)"},

 {w:"lethargic",pos:"adj",def:"sluggish; lacking energy and alertness",root:"Greek <b>lethargia</b> = drowsiness"},

 {w:"trivial",pos:"adj",def:"of little value or importance",root:"Latin <b>trivialis</b> = commonplace (found at every crossroad)"},

// ---------- storage ----------
const KEY="vokab.v1";
function load(){
  let s=localStorage.getItem(KEY);
  if(s){ try{ return JSON.parse(s); }catch(e){} }
  // first run: build cards from seed
  const cards=SEED.map(seedToCard);
  const db={cards, created:Date.now()};
  save(db); return db;
}
function save(db){ localStorage.setItem(KEY, JSON.stringify(db)); }
function seedToCard(s){
  return {
    id:cryptoId(), w:s.w, pos:s.pos||"", def:s.def||"", root:s.root||"",
    sentence:"",                 // your own example sentence
    // spaced-repetition state (SM-2 style)
    ease:2.5, interval:0, reps:0, due:Date.now(), lapses:0
  };
}
function cryptoId(){ return Math.random().toString(36).slice(2,10); }

let DB = load();

// ---------- spaced repetition (simplified SM-2 / FSRS-lite) ----------
const DAY=86400000;
function schedule(card, rating){ // rating: 'again' | 'good' | 'easy'
  card.reps++;
  if(rating==='again'){
    card.lapses++; card.interval=0; card.ease=Math.max(1.3,card.ease-0.2);
    card.due=Date.now()+ 60*1000;            // see again in ~1 min this session
  } else if(rating==='good'){
    if(card.interval===0) card.interval=1;
    else if(card.interval===1) card.interval=3;
    else card.interval=Math.round(card.interval*card.ease);
    card.due=Date.now()+card.interval*DAY;
  } else { // easy
    card.ease+=0.15;
    card.interval = card.interval===0 ? 4 : Math.round(card.interval*card.ease*1.3);
    card.due=Date.now()+card.interval*DAY;
  }
  save(DB);
}
function dueCards(){ const now=Date.now(); return DB.cards.filter(c=>c.due<=now).sort((a,b)=>a.due-b.due); }

// ---------- Datamuse word-web (free, no key, needs WiFi) ----------
const webCache={};
async function fetchWeb(word){
  if(webCache[word]) return webCache[word];
  const q=(rel)=>fetch(`https://api.datamuse.com/words?rel_${rel}=${encodeURIComponent(word)}&max=8`).then(r=>r.json()).catch(()=>[]);
  try{
    const [syn,ant,col]=await Promise.all([q('syn'),q('ant'),q('bga')]); // bga = words that frequently FOLLOW the word (collocations)
    const out={
      syn:syn.map(x=>x.word).slice(0,8),
      ant:ant.map(x=>x.word).slice(0,8),
      col:col.map(x=>x.word).slice(0,6)
    };
    webCache[word]=out; return out;
  }catch(e){ return {syn:[],ant:[],col:[],offline:true}; }
}

// ---------- pronunciation (browser TTS, offline) ----------
function speak(t){ try{ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }

// ---------- views ----------
let view='study';
let revealed=false;
let current=null;

function go(v){ stopNet(); view=v; revealed=false;
  ['study','web','browse','add'].forEach(n=>document.getElementById('nav-'+n).classList.toggle('on',n===v));
  render();
}
function render(){
  renderStats();
  if(view==='study') return renderStudy();
  if(view==='web') return renderWeb();
  if(view==='browse') return renderBrowse();
  if(view==='add') return renderAdd();
}
function renderStats(){
  const due=dueCards().length, total=DB.cards.length;
  document.getElementById('stats').innerHTML=`${total} words<br><b style="color:var(--accent)">${due}</b> due now`;
}

function renderStudy(){
  const m=document.getElementById('main');
  const due=dueCards();
  if(due.length===0){
    m.innerHTML=`<div class="done"><div class="big">✅</div>
      <h2>All caught up!</h2>
      <p>No words due right now. Add more in the <b>Add</b> tab, or come back later — spaced repetition will bring words back right before you'd forget them.</p></div>`;
    current=null; return;
  }
  current = due[0];
  const c=current;
  m.innerHTML=`
    <div class="card">
      <div class="word">${c.w}</div>
      ${c.pos?`<div class="pos">${c.pos}</div>`:''}
      <div class="pron" onclick="speak('${c.w}')">🔊 hear it</div>

      <div id="answer" class="${revealed?'':'hidden'}">
        <div class="def">${c.def||'<span class="small">no definition yet — add one in Words tab</span>'}</div>
        ${c.root?`<div class="root">🌱 ${c.root}</div>`:''}
        <div class="web" id="web"><div class="loading">loading word-web…</div></div>

        <div class="practice">
          <h3 style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">✍️ Use it in a sentence</h3>
          <textarea id="sent" placeholder="Write your own sentence — this is what makes it stick for real conversation.">${c.sentence||''}</textarea>
          <div class="row">
            <button class="act b-ghost" onclick="saveSentence()">Save sentence</button>
          </div>
        </div>

        <div class="row" style="margin-top:18px">
          <button class="act b-again" onclick="rate('again')">Again</button>
          <button class="act b-good" onclick="rate('good')">Good</button>
          <button class="act b-easy" onclick="rate('easy')">Easy</button>
        </div>
      </div>

      <div id="prompt" class="${revealed?'hidden':''}">
        <div class="reveal-hint">Do you know what this word means?<br>Recall it first, then reveal.</div>
        <div class="row" style="margin-top:14px">
          <button class="act b-show" onclick="reveal()">Show answer</button>
        </div>
      </div>
    </div>`;
  if(revealed) loadWebInto(c.w);
}
function reveal(){ revealed=true; renderStudy(); }
async function loadWebInto(word){
  const el=document.getElementById('web'); if(!el) return;
  const data=await fetchWeb(word);
  const sec=(title,arr,cls)=> arr&&arr.length
    ? `<h3>${title}</h3><div class="chips">${arr.map(x=>`<span class="chip ${cls}" onclick="speak('${x.replace(/'/g,"")}')">${x}</span>`).join('')}</div>` : '';
  let html = sec('Synonyms',data.syn,'syn')+sec('Opposites',data.ant,'ant')+sec('Often followed by (collocations)',data.col,'col');
  if(!html) html=`<div class="small">${data.offline?'Offline — connect to WiFi to load the word-web.':'No links found for this word.'}</div>`;
  el.innerHTML=html;
}
function saveSentence(){ if(!current)return; const t=document.getElementById('sent').value.trim(); current.sentence=t; save(DB); flash('Saved ✓'); }
function rate(r){ if(!current)return; const t=document.getElementById('sent'); if(t) current.sentence=t.value.trim(); schedule(current,r); revealed=false; renderStudy(); renderStats(); }

function renderBrowse(){
  const m=document.getElementById('main');
  const cards=[...DB.cards].sort((a,b)=>a.w.localeCompare(b.w));
  m.innerHTML = `<div style="margin:6px 0 12px" class="small">${cards.length} words. Tap a word to hear it.</div>` +
    cards.map(c=>{
      const days=Math.max(0,Math.round((c.due-Date.now())/DAY));
      const dueTxt = c.due<=Date.now()?'<b style="color:var(--accent)">due</b>':`in ${days}d`;
      return `<div class="listitem">
        <div><span style="cursor:pointer" onclick="speak('${c.w}')">${c.w}</span>
          <span class="tag">${c.reps} reps</span></div>
        <div class="due">${dueTxt} · <span style="cursor:pointer;color:var(--again)" onclick="del('${c.id}')">✕</span></div>
      </div>`;
    }).join('');
}
function del(id){ DB.cards=DB.cards.filter(c=>c.id!==id); save(DB); render(); }

function renderAdd(){
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="card">
      <h3 style="margin-top:0">Add a word</h3>
      <div class="addbar"><input id="nw" placeholder="word (e.g. ostentatious)" /></div>
      <input id="nd" class="addbar-in" style="width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:15px" placeholder="definition (optional — leave blank to look up online)"/>
      <div class="row"><button class="act b-show" onclick="addWord()">Add word</button></div>
      <p class="small" style="margin-top:14px">Tip: if you leave the definition blank and you're on WiFi, Vokab will try to fetch one for you automatically.</p>
    </div>
    <div class="card">
      <h3 style="margin-top:0">📦 Word packs</h3>
      ${Object.keys(PACKS).map(name=>`<div class="listitem">
          <div>${name}<span class="tag">${PACKS[name].length} words</span></div>
          <button class="addbar" style="background:var(--accent);color:#0c1024;border:none;border-radius:10px;padding:6px 14px;font-weight:600;cursor:pointer;margin:0" onclick="loadPack('${name}')">Load</button>
        </div>`).join('')}
      <p class="small" style="margin-top:10px">Loading a pack adds its words (skips any you already have), each with definition + root.</p>
    </div>
    <div class="card">
      <h3 style="margin-top:0">Bulk add</h3>
      <textarea id="bulk" style="width:100%;min-height:90px;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit" placeholder="One word per line. Paste a whole SAT list here."></textarea>
      <div class="row"><button class="act b-ghost" onclick="bulkAdd()">Add all</button></div>
    </div>
    `;
}
async function lookupDef(word){
  try{
    const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`).then(r=>r.json());
    const m=r&&r[0]&&r[0].meanings&&r[0].meanings[0];
    if(m){ return {pos:m.partOfSpeech||'', def:(m.definitions[0]&&m.definitions[0].definition)||''}; }
  }catch(e){}
  return {pos:'',def:''};
}
async function addWord(){
  const w=document.getElementById('nw').value.trim().toLowerCase();
  let d=document.getElementById('nd').value.trim();
  if(!w) return;
  let pos='';
  if(!d){ const r=await lookupDef(w); d=r.def; pos=r.pos; }
  DB.cards.push(Object.assign(seedToCard({w,def:d,pos}),{}));
  save(DB); flash('Added ✓'); go('browse');
}
async function bulkAdd(){
  const lines=document.getElementById('bulk').value.split('\n').map(x=>x.trim().toLowerCase()).filter(Boolean);
  for(const w of lines){
    if(DB.cards.some(c=>c.w===w)) continue;
    const r=await lookupDef(w);
    DB.cards.push(seedToCard({w,def:r.def,pos:r.pos}));
  }
  save(DB); flash(`Added ${lines.length} ✓`); go('browse');
}

function loadPack(name){
  const pack=PACKS[name]||[]; let added=0;
  for(const e of pack){ if(DB.cards.some(c=>c.w===e.w)) continue; DB.cards.push(seedToCard(e)); added++; }
  save(DB); flash(`Added ${added} new words ✓`); go('browse');
}

function flash(msg){
  let f=document.createElement('div');
  f.textContent=msg;
  f.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0c1024;padding:8px 16px;border-radius:999px;font-weight:600;z-index:99';
  document.body.appendChild(f); setTimeout(()=>f.remove(),1200);
}

/* ==========================================================
   Word-web graph  — every word a node, linked by how related
   their meanings are (shared definition words + shared roots).
   Pure canvas + a tiny force simulation. Offline, no deps.
==========================================================*/

// words too common to count as a "link" between two definitions
const STOP=new Set(("a an the to of or and but in on for with within without not no nor by as at be is are was were "+
 "that which who whom whose this these those it its their them they you your our we us i me my "+
 "very often especially usually etc more most less than then way ways thing things make makes made making "+
 "do does done doing person persons people someone something somebody being having show shows showing "+
 "able like such over under into onto from out off up down about after before when while where what how "+
 "all any each every other others another only also just so too can may might will would should could "+
 "one two get gets got give given gives take taken takes put puts used use uses using kind kinds sort "+
 "type types full lack lacks lacking quality state states act acts action actions manner toward towards "+
 "latin greek french italian spanish german old english anglo norse imitative likely probably perhaps "+
 "origin root word words family meaning real really often himself herself oneself").split(/\s+/));

function netToks(str){               // -> array of meaningful tokens
  if(!str) return [];
  const clean=str.replace(/<[^>]*>/g,' ').replace(/[^a-zA-Z\s-]/g,' ').toLowerCase();
  return clean.split(/[\s-]+/).filter(t=>t.length>=4 && !STOP.has(t));
}

function buildGraph(){
  const cards=DB.cards;
  const nodes=cards.map((c,i)=>({
    id:c.id, i, w:c.w, c,
    defT:new Set(netToks(c.def+' '+c.pos)),
    rootT:new Set(netToks(c.root)),
    x:0,y:0,vx:0,vy:0,fx:0,fy:0
  }));
  // initial layout: a circle, so the sim opens up smoothly
  const R=Math.max(120, nodes.length*9);
  nodes.forEach((n,k)=>{ const a=k/nodes.length*Math.PI*2; n.x=Math.cos(a)*R; n.y=Math.sin(a)*R; });

  // candidate links: weight = shared def words + 2× shared root words
  const cand=[];
  const inter=(A,B)=>{ let s=0; for(const t of A) if(B.has(t)) s++; return s; };
  for(let a=0;a<nodes.length;a++) for(let b=a+1;b<nodes.length;b++){
    const w=inter(nodes[a].defT,nodes[b].defT) + 2*inter(nodes[a].rootT,nodes[b].rootT);
    if(w>0) cand.push({a,b,w});
  }
  cand.sort((x,y)=>y.w-x.w);

  // keep strong links (w>=2), capped to ~4 per node to avoid a hairball
  const deg=new Array(nodes.length).fill(0), edges=[], seen=new Set();
  const key=(a,b)=>a<b?a+'-'+b:b+'-'+a;
  for(const e of cand){
    if(e.w<2) continue;
    if(deg[e.a]>=4 || deg[e.b]>=4) continue;
    if(seen.has(key(e.a,e.b))) continue;
    seen.add(key(e.a,e.b)); edges.push(e); deg[e.a]++; deg[e.b]++;
  }
  // rescue: give any still-isolated word its single best partner (w>=1)
  for(const e of cand){
    if(deg[e.a]>0 && deg[e.b]>0) continue;
    if(seen.has(key(e.a,e.b))) continue;
    seen.add(key(e.a,e.b)); edges.push(e); deg[e.a]++; deg[e.b]++;
  }
  // adjacency (for highlight on select)
  const adj={}; nodes.forEach(n=>adj[n.id]=new Set());
  for(const e of edges){ adj[nodes[e.a].id].add(nodes[e.b].id); adj[nodes[e.b].id].add(nodes[e.a].id); }
  return {nodes, edges, adj};
}

function netColor(c){
  if(c.reps===0) return '#9aa3c7';            // new (grey)
  if(c.due<=Date.now()) return '#fb7185';     // due to review (red)
  if(c.interval>=21) return '#34d399';        // well learned (green)
  return '#22d3ee';                           // learning (cyan)
}

let net=null;
function renderWeb(){
  const m=document.getElementById('main');
  if(DB.cards.length<2){
    m.innerHTML=`<div class="done"><div class="big">🕸️</div><h2>Your word-web</h2>
      <p>Add a few words (Add tab) and they'll appear here as a web — words with related
      meanings or shared roots get linked together.</p></div>`;
    return;
  }
  m.innerHTML=`<div class="webwrap">
    <canvas id="net"></canvas>
    <div class="legend">
      <i style="background:#9aa3c7"></i>new<br>
      <i style="background:#22d3ee"></i>learning<br>
      <i style="background:#fb7185"></i>due now<br>
      <i style="background:#34d399"></i>learned
    </div>
    <div class="netbtns">
      <button onclick="netZoom(1.25)">＋</button>
      <button onclick="netZoom(0.8)">－</button>
      <button onclick="netReset()">⟳</button>
    </div>
    <div class="webhint">drag a node · pinch / scroll to zoom · tap a word</div>
  </div>`;
  startNet();
}

const REP=2600, SPRING=0.018, LEN=72, GRAV=0.02, DAMP=0.82;
function startNet(){
  const cv=document.getElementById('net'); if(!cv) return;
  const g=buildGraph();
  net={...g, cv, ctx:cv.getContext('2d'), tf:{s:1,x:0,y:0}, sel:null,
    cx:0, cy:0, alpha:1, raf:null, dragNode:null, dragging:false, pinching:false,
    pointers:new Map(), pinchStart:null, moved:0, downId:null, dpr:Math.min(devicePixelRatio||1,2)};
  sizeNet();
  // center the canvas origin on the middle of the view
  net.tf.x=net.cx; net.tf.y=net.cy;
  bindNet();
  window.addEventListener('resize', sizeNet);
  net.raf=requestAnimationFrame(frameNet);
}
function stopNet(){
  if(!net) return;
  if(net.raf) cancelAnimationFrame(net.raf);
  window.removeEventListener('resize', sizeNet);
  net=null;
}
function sizeNet(){
  if(!net) return; const cv=net.cv;
  const w=cv.clientWidth, h=cv.clientHeight;
  net.cx=w/2; net.cy=h/2;
  cv.width=w*net.dpr; cv.height=h*net.dpr;
  drawNet();
}

// --- coordinate helpers (screen<->world, in CSS pixels) ---
function s2w(sx,sy){ const t=net.tf; return {x:(sx-t.x)/t.s, y:(sy-t.y)/t.s}; }
function nodeAt(sx,sy){
  const p=s2w(sx,sy); let best=null,bd=1e9;
  for(const n of net.nodes){ const dx=n.x-p.x, dy=n.y-p.y, d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=n;} }
  const r=(14/net.tf.s); if(best && bd<=r*r) return best; return null;
}

// --- physics ---
function frameNet(){
  tickNet(); drawNet();
  net.raf=(net.alpha>0.02 || net.dragging || net.pinching)?requestAnimationFrame(frameNet):null;
}
function reheat(a){ if(!net) return; net.alpha=Math.max(net.alpha,a); if(!net.raf) net.raf=requestAnimationFrame(frameNet); }
function tickNet(){
  const n=net.nodes, A=net.alpha;
  for(const a of n){ a.fx=0; a.fy=0; }
  for(let i=0;i<n.length;i++) for(let j=i+1;j<n.length;j++){
    const a=n[i],b=n[j]; let dx=a.x-b.x,dy=a.y-b.y; let d=Math.sqrt(dx*dx+dy*dy)||0.1;
    const f=REP/(d*d)*A, fx=f*dx/d, fy=f*dy/d;
    a.fx+=fx; a.fy+=fy; b.fx-=fx; b.fy-=fy;
  }
  for(const e of net.edges){
    const a=n[e.a],b=n[e.b]; let dx=b.x-a.x,dy=b.y-a.y; let d=Math.sqrt(dx*dx+dy*dy)||0.1;
    const f=(d-LEN)*SPRING*Math.min(e.w,4)*A, fx=f*dx/d, fy=f*dy/d;
    a.fx+=fx; a.fy+=fy; b.fx-=fx; b.fy-=fy;
  }
  for(const a of n){ a.fx+=(-a.x)*GRAV*A; a.fy+=(-a.y)*GRAV*A; }   // pull toward origin (center)
  for(const a of n){
    if(a===net.dragNode) continue;
    a.vx=(a.vx+a.fx)*DAMP; a.vy=(a.vy+a.fy)*DAMP;
    a.x+=a.vx; a.y+=a.vy;
  }
  net.alpha*=0.985;
}

// --- drawing ---
function drawNet(){
  if(!net) return; const ctx=net.ctx, t=net.tf, d=net.dpr;
  ctx.setTransform(d,0,0,d,0,0);
  ctx.clearRect(0,0,net.cv.width,net.cv.height);
  ctx.translate(t.x,t.y); ctx.scale(t.s,t.s);
  const sel=net.sel, adj=sel?net.adj[sel.id]:null;
  // edges
  for(const e of net.edges){
    const a=net.nodes[e.a], b=net.nodes[e.b];
    const hot=sel && (a===sel||b===sel);
    ctx.strokeStyle=sel? (hot?'rgba(124,131,255,.9)':'rgba(124,131,255,.07)')
                       : `rgba(124,131,255,${0.12+Math.min(e.w,5)*0.05})`;
    ctx.lineWidth=(hot?2:1)/t.s;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  // nodes
  const showAll = t.s>=1.15 || net.nodes.length<=22;
  for(const n of net.nodes){
    const r=6+Math.min(n.c.reps,6);
    const dim = sel && n!==sel && !(adj&&adj.has(n.id));
    ctx.globalAlpha = dim?0.3:1;
    ctx.fillStyle=netColor(n.c);
    ctx.beginPath(); ctx.arc(n.x,n.y,r,0,Math.PI*2); ctx.fill();
    if(n===sel){ ctx.strokeStyle='#fff'; ctx.lineWidth=2.5/t.s; ctx.stroke(); }
    if(showAll || n===sel || (adj&&adj.has(n.id))){
      ctx.globalAlpha = dim?0.3:1;
      ctx.fillStyle='#eef1ff'; ctx.font=`${12/t.s}px -apple-system,Segoe UI,Roboto,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillText(n.w, n.x, n.y+r+2);
    }
  }
  ctx.globalAlpha=1;
}

// --- zoom buttons ---
function netZoom(f){ if(!net) return; const t=net.tf;
  const wx=(net.cx-t.x)/t.s, wy=(net.cy-t.y)/t.s;
  t.s=Math.max(0.3,Math.min(4,t.s*f)); t.x=net.cx-wx*t.s; t.y=net.cy-wy*t.s; drawNet();
}
function netReset(){ if(!net) return; net.tf={s:1,x:net.cx,y:net.cy}; net.sel=null; closePanel(); reheat(0.6); }

// --- selection panel ---
function netSelect(n){
  net.sel=n; drawNet();
  let p=document.getElementById('netpanel');
  if(!p){ p=document.createElement('div'); p.id='netpanel'; p.className='netpanel';
    document.querySelector('.webwrap').appendChild(p); }
  const c=n.c;
  p.innerHTML=`<span class="x" onclick="closePanel()">✕</span>
    <div class="w">${c.w}</div>
    ${c.pos?`<div class="p">${c.pos}</div>`:''}
    <div class="d">${c.def||'<span style="color:var(--muted)">no definition yet</span>'}</div>
    <button class="go" onclick="netStudy('${c.id}')">Study this word →</button>`;
}
function closePanel(){ const p=document.getElementById('netpanel'); if(p) p.remove(); if(net){ net.sel=null; drawNet(); } }
function netStudy(id){
  const c=DB.cards.find(x=>x.id===id); if(!c) return;
  c.due=Date.now(); save(DB);          // make it due so Study shows it next
  go('study');
}

// --- pointer interaction (drag / pan / pinch / tap) ---
function bindNet(){
  const cv=net.cv;
  cv.addEventListener('pointerdown',e=>{
    cv.setPointerCapture(e.pointerId);
    net.pointers.set(e.pointerId,{x:e.offsetX,y:e.offsetY});
    net.moved=0;
    if(net.pointers.size===1){
      const n=nodeAt(e.offsetX,e.offsetY);
      net.downId=n?n.id:'__bg__';
      if(n){ net.dragNode=n; net.dragging=true; }
      else { net.panning=true; net.last={x:e.offsetX,y:e.offsetY}; }
    } else if(net.pointers.size===2){
      net.dragNode=null; net.dragging=false; net.panning=false; net.pinching=true;
      const pts=[...net.pointers.values()];
      const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      net.pinchStart={dist:dist2(pts[0],pts[1]), s:net.tf.s, world:s2w(mid.x,mid.y)};
    }
  });
  cv.addEventListener('pointermove',e=>{
    const pr=net.pointers.get(e.pointerId); if(!pr) return;
    const px=e.offsetX, py=e.offsetY; net.moved+=Math.abs(px-pr.x)+Math.abs(py-pr.y);
    pr.x=px; pr.y=py;
    if(net.pinching && net.pointers.size>=2){
      const pts=[...net.pointers.values()];
      const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      const ps=net.pinchStart;
      net.tf.s=Math.max(0.3,Math.min(4, ps.s*dist2(pts[0],pts[1])/ps.dist));
      net.tf.x=mid.x-ps.world.x*net.tf.s; net.tf.y=mid.y-ps.world.y*net.tf.s;
      drawNet();
    } else if(net.dragNode){
      const w=s2w(px,py); net.dragNode.x=w.x; net.dragNode.y=w.y;
      net.dragNode.vx=0; net.dragNode.vy=0; reheat(0.35);
    } else if(net.panning){
      net.tf.x+=px-net.last.x; net.tf.y+=py-net.last.y; net.last={x:px,y:py}; drawNet();
    }
  });
  const end=e=>{
    net.pointers.delete(e.pointerId);
    if(net.moved<6 && net.pointers.size===0){          // a tap, not a drag
      if(net.downId && net.downId!=='__bg__'){ const n=net.nodes.find(x=>x.id===net.downId); if(n) netSelect(n); }
      else closePanel();
    }
    if(net.pointers.size<2) net.pinching=false;
    if(net.pointers.size===0){ net.dragNode=null; net.dragging=false; net.panning=false; }
  };
  cv.addEventListener('pointerup',end);
  cv.addEventListener('pointercancel',end);
  cv.addEventListener('wheel',e=>{ e.preventDefault();
    const t=net.tf, w=s2w(e.offsetX,e.offsetY), f=e.deltaY<0?1.1:0.9;
    t.s=Math.max(0.3,Math.min(4,t.s*f)); t.x=e.offsetX-w.x*t.s; t.y=e.offsetY-w.y*t.s; drawNet();
  },{passive:false});
}
function dist2(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

render();
</script>
