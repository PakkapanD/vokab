<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#4f46e5" />
<title>Vokab — Vocab by P'N</title>
<style>
  :root{
    --bg:#0f1220; --card:#1a1f35; --card2:#232a45; --ink:#eef1ff; --muted:#9aa3c7;
    --accent:#7c83ff; --good:#34d399; --easy:#22d3ee; --again:#fb7185; --line:#2c3358;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  header{
    padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;background:linear-gradient(var(--bg),rgba(15,18,32,.85));backdrop-filter:blur(6px);z-index:5;
  }
  header h1{font-size:20px;margin:0;letter-spacing:.5px}
  header h1 span{color:var(--accent)}
  .stats{font-size:12px;color:var(--muted);text-align:right;line-height:1.5}
  main{flex:1;padding:8px 16px 90px}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);
  }

  /* ---- pack chooser ---- */
  .pack{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px;margin-bottom:16px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.25);
    display:flex;justify-content:space-between;align-items:center;gap:14px;
  }
  .pack:active{transform:scale(.99)}
  .pack .pname{font-size:21px;font-weight:700}
  .pack .pmeta{font-size:13px;color:var(--muted);margin-top:4px}
  .pack .parrow{font-size:26px;color:var(--accent)}
  .bar{height:8px;border-radius:99px;background:var(--card2);margin-top:12px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--good)}

  /* ---- study card ---- */
  .th{font-size:30px;font-weight:700;letter-spacing:.3px;line-height:1.3}
  .pos{font-size:13px;color:var(--muted);font-style:italic;margin-top:6px}
  .hidden{display:none}
  .reveal-hint{margin-top:22px;color:var(--muted);font-size:14px;text-align:center;line-height:1.6}

  .tiers{margin-top:16px}
  .tier{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0}
  .tier+.tier{border-top:1px solid var(--line)}
  .chip{
    background:var(--card2);border:1px solid var(--line);color:var(--ink);
    padding:7px 12px;border-radius:999px;font-size:15px;cursor:pointer;
  }
  .chip:active{transform:scale(.96)}

  .practice{margin-top:18px}
  .practice h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:0 0 8px}
  .practice textarea{
    width:100%;min-height:64px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line);border-radius:12px;padding:10px;font-size:15px;resize:vertical;font-family:inherit;
  }
  .row{display:flex;gap:8px;margin-top:10px}
  button.act{
    flex:1;border:none;border-radius:12px;padding:13px 0;font-size:15px;font-weight:600;color:#0c1024;cursor:pointer;
  }
  .b-again{background:var(--again)} .b-good{background:var(--good)} .b-easy{background:var(--easy)}
  .b-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .b-show{background:var(--accent);color:#0c1024}

  .small{font-size:12px;color:var(--muted)}
  .done{text-align:center;padding:50px 20px}
  .done .big{font-size:46px}
  .done h2{margin:10px 0}
  .done p{color:var(--muted);line-height:1.6}

  nav{
    position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;
    display:flex;background:var(--card);border-top:1px solid var(--line);
  }
  nav button{
    flex:1;background:none;border:none;color:var(--muted);padding:12px 0 14px;font-size:12px;cursor:pointer;
  }
  nav button.on{color:var(--accent)}
  nav button .ic{display:block;font-size:20px;margin-bottom:2px}

  .concept{padding:14px 4px;border-bottom:1px solid var(--line)}
  .concept .ch{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .concept .cth{font-size:17px;font-weight:600}
  .concept .cpos{font-size:12px;color:var(--muted);font-style:italic}
  .concept .cw{margin-top:6px;font-size:14px;color:var(--muted);line-height:1.6}
  .concept .due{font-size:11px;color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Vo<span>kab</span></h1>
    <div class="stats" id="stats"></div>
  </header>

  <main id="main"></main>

  <nav>
    <button id="nav-packs" class="on" onclick="go('packs')"><span class="ic">📦</span>Packs</button>
    <button id="nav-study" onclick="go('study')"><span class="ic">🎯</span>Study</button>
    <button id="nav-browse" onclick="go('browse')"><span class="ic">📚</span>Words</button>
  </nav>
</div>

// ---------- storage ----------
const KEY="vokab.v2";   // v2: new "Vocab by P'N" cluster deck (old v1 word deck removed)
function load(){
  let s=localStorage.getItem(KEY);
  if(s){ try{ const db=JSON.parse(s); if(db && db.cards) { syncPacks(db); return db; } }catch(e){} }
  const db={cards:[], created:Date.now()};
  syncPacks(db); save(db); return db;
}
function save(db){ localStorage.setItem(KEY, JSON.stringify(db)); }
function cryptoId(){ return Math.random().toString(36).slice(2,10); }

// build a study card from a pack entry
function toCard(e, pack){
  return {
    id:cryptoId(), pack, th:e.th, pos:e.pos||"", groups:e.groups||[],
    sentence:"",
    ease:2.5, interval:0, reps:0, due:Date.now(), lapses:0
  };
}
// make sure every pack concept exists as a card (keeps progress for ones already there)
function syncPacks(db){
  for(const pack in PACKS){
    for(const e of PACKS[pack]){
      const has=db.cards.some(c=>c.pack===pack && c.th===e.th);
      if(!has) db.cards.push(toCard(e, pack));
      else { // refresh content (words/pos) in case the pack was updated, keep SRS progress
        const c=db.cards.find(c=>c.pack===pack && c.th===e.th);
        c.pos=e.pos||""; c.groups=e.groups||[];
      }
    }
  }
}

let DB = load();
let currentPack = null;

// ---------- spaced repetition (simplified SM-2) ----------
const DAY=86400000;
function schedule(card, rating){ // 'again' | 'good' | 'easy'
  card.reps++;
  if(rating==='again'){
    card.lapses++; card.interval=0; card.ease=Math.max(1.3,card.ease-0.2);
    card.due=Date.now()+ 60*1000;            // see again in ~1 min this session
  } else if(rating==='good'){
    if(card.interval===0) card.interval=1;
    else if(card.interval===1) card.interval=3;
    else card.interval=Math.round(card.interval*card.ease);
    card.due=Date.now()+card.interval*DAY;
  } else { // easy
    card.ease+=0.15;
    card.interval = card.interval===0 ? 4 : Math.round(card.interval*card.ease*1.3);
    card.due=Date.now()+card.interval*DAY;
  }
  save(DB);
}
function packCards(pack){ return DB.cards.filter(c=>c.pack===pack); }
function dueCards(pack){ const now=Date.now(); return packCards(pack).filter(c=>c.due<=now).sort((a,b)=>a.due-b.due); }

// ---------- pronunciation (browser TTS, offline) ----------
function say(w){ // strip stress marks / notes so it sounds natural
  return w.replace(/'/g,'').replace(/\([^)]*\)/g,'').replace(/[=].*$/,'')
          .replace(/\+/g,'').replace(/[\/]/g,' ').replace(/\s+/g,' ').trim();
}
function speak(t){ try{ const u=new SpeechSynthesisUtterance(t); u.lang='en-US'; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
let STUDY_SAY=[];
function speakWord(i){ if(STUDY_SAY[i]!=null) speak(STUDY_SAY[i]); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ---------- views ----------
let view='packs';
let revealed=false;
let current=null;

function go(v){ view=v; revealed=false;
  ['packs','study','browse'].forEach(n=>document.getElementById('nav-'+n).classList.toggle('on',n===v));
  render();
}
function render(){
  renderStats();
  if(view==='packs') return renderPacks();
  if(view==='study') return renderStudy();
  if(view==='browse') return renderBrowse();
}
function renderStats(){
  if(currentPack){
    const due=dueCards(currentPack).length, total=packCards(currentPack).length;
    document.getElementById('stats').innerHTML=`${esc(currentPack)}<br><b style="color:var(--accent)">${due}</b> due now`;
  } else {
    document.getElementById('stats').innerHTML='pick a pack →';
  }
}

function renderPacks(){
  const m=document.getElementById('main');
  m.innerHTML = `<div class="small" style="margin:6px 4px 14px">Choose a pack to learn its words.</div>` +
    Object.keys(PACKS).map((name,idx)=>{
      const cards=packCards(name), total=cards.length;
      const learned=cards.filter(c=>c.reps>0).length;
      const due=dueCards(name).length;
      const pct=total?Math.round(learned/total*100):0;
      return `<div class="pack" onclick="openPack(${idx})">
        <div style="flex:1">
          <div class="pname">${esc(name)}</div>
          <div class="pmeta">${total} groups · ${learned} started · <b style="color:var(--accent)">${due} due</b></div>
          <div class="bar"><i style="width:${pct}%"></i></div>
        </div>
        <div class="parrow">›</div>
      </div>`;
    }).join('');
}
function openPack(idx){ currentPack=Object.keys(PACKS)[idx]; go('study'); }

function renderStudy(){
  const m=document.getElementById('main');
  if(!currentPack){
    m.innerHTML=`<div class="done"><div class="big">📦</div>
      <h2>Pick a pack first</h2>
      <p>Go to the <b>Packs</b> tab and choose a pack to study.</p>
      <div class="row" style="max-width:240px;margin:18px auto 0"><button class="act b-show" onclick="go('packs')">Choose a pack</button></div></div>`;
    current=null; return;
  }
  const due=dueCards(currentPack);
  if(due.length===0){
    m.innerHTML=`<div class="done"><div class="big">✅</div>
      <h2>All caught up!</h2>
      <p>No groups due in <b>${esc(currentPack)}</b> right now. Spaced repetition will bring them back right before you'd forget.</p>
      <div class="row" style="max-width:240px;margin:18px auto 0"><button class="act b-ghost" onclick="go('packs')">Other packs</button></div></div>`;
    current=null; return;
  }
  current = due[0];
  const c=current;

  STUDY_SAY=[];
  const tiersHtml = c.groups.map(g=>{
    const chips = g.map(w=>{ const i=STUDY_SAY.length; STUDY_SAY.push(say(w));
      return `<span class="chip" onclick="speakWord(${i})">${esc(w)}</span>`; }).join('');
    return `<div class="tier">${chips}</div>`;
  }).join('');

  m.innerHTML=`
    <div class="card">
      <div class="th">${esc(c.th)}</div>
      ${c.pos?`<div class="pos">(${esc(c.pos)})</div>`:''}

      <div id="answer" class="${revealed?'':'hidden'}">
        <div class="tiers">${tiersHtml}</div>
        <div class="small" style="margin-top:6px">Tap a word to hear it. Lines separate easy → harder words.</div>

        <div class="practice">
          <h3>✍️ Use one in a sentence</h3>
          <textarea id="sent" placeholder="Write your own sentence with one of these words — this is what makes it stick.">${esc(c.sentence||'')}</textarea>
          <div class="row"><button class="act b-ghost" onclick="saveSentence()">Save sentence</button></div>
        </div>

        <div class="row" style="margin-top:18px">
          <button class="act b-again" onclick="rate('again')">Again</button>
          <button class="act b-good" onclick="rate('good')">Good</button>
          <button class="act b-easy" onclick="rate('easy')">Easy</button>
        </div>
      </div>

      <div id="prompt" class="${revealed?'hidden':''}">
        <div class="reveal-hint">Which English words mean this?<br>Recall as many as you can, then reveal.</div>
        <div class="row" style="margin-top:14px">
          <button class="act b-show" onclick="reveal()">Show answer</button>
        </div>
      </div>
    </div>`;
}
function reveal(){ revealed=true; renderStudy(); }
function saveSentence(){ if(!current)return; const t=document.getElementById('sent'); if(t){current.sentence=t.value.trim(); save(DB); flash('Saved ✓');} }
function rate(r){ if(!current)return; const t=document.getElementById('sent'); if(t) current.sentence=t.value.trim(); schedule(current,r); revealed=false; renderStudy(); renderStats(); }

function renderBrowse(){
  const m=document.getElementById('main');
  if(!currentPack){
    m.innerHTML=`<div class="done"><div class="big">📚</div><h2>No pack chosen</h2>
      <p>Pick a pack in the <b>Packs</b> tab to see its words.</p></div>`;
    return;
  }
  const cards=packCards(currentPack);
  m.innerHTML = `<div class="small" style="margin:6px 4px 12px">${esc(currentPack)} · ${cards.length} groups</div>` +
    cards.map(c=>{
      const words=c.groups.flat();
      const days=Math.max(0,Math.round((c.due-Date.now())/DAY));
      const dueTxt = c.due<=Date.now() ? (c.reps?'due':'new') : `in ${days}d`;
      return `<div class="concept">
        <div class="ch"><div class="cth">${esc(c.th)} <span class="cpos">${esc(c.pos)}</span></div>
          <div class="due">${dueTxt}</div></div>
        <div class="cw">${words.map(esc).join(' · ')}</div>
      </div>`;
    }).join('');
}

function flash(msg){
  let f=document.createElement('div');
  f.textContent=msg;
  f.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0c1024;padding:8px 16px;border-radius:999px;font-weight:600;z-index:99';
  document.body.appendChild(f); setTimeout(()=>f.remove(),1200);
}

render();
</script>
</body>
</html>
