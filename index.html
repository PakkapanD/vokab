<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Vokab — Vocab by P'N</title>
  <style>
    :root {
      --bg: #0f1220;
      --card: #1a1f35;
      --card2: #232a45;
      --ink: #eef1ff;
      --muted: #9aa3c7;
      --accent: #7c83ff;
      --good: #34d399;
      --easy: #22d3ee;
      --again: #fb7185;
      --line: #2c3358;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      height: 100%
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100%;
      display: flex;
      flex-direction: column
    }

    header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: linear-gradient(var(--bg), rgba(15, 18, 32, .85));
      backdrop-filter: blur(6px);
      z-index: 5;
      gap: 10px;
    }

    header h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: .5px;
      flex-shrink: 0;
    }

    header h1 span {
      color: var(--accent)
    }

    .header-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .header-dropdown {
      position: relative;
    }

    .profile-selector {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-selector:active {
      transform: scale(.96);
    }

    main {
      flex: 1;
      padding: 8px 16px 90px
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
    }

    .pack {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .pack:active {
      transform: scale(.99)
    }

    .pack .pname {
      font-size: 21px;
      font-weight: 700
    }

    .pack .pmeta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px
    }

    .pack .parrow {
      font-size: 26px;
      color: var(--accent)
    }

    .bar {
      height: 8px;
      border-radius: 99px;
      background: var(--card2);
      margin-top: 12px;
      overflow: hidden
    }

    .bar>i {
      display: block;
      height: 100%;
      background: var(--good)
    }

    .th {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: .3px;
      line-height: 1.3
    }

    .pos {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-top: 6px
    }

    .hidden {
      display: none
    }

    .reveal-hint {
      margin-top: 22px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.6
    }

    .tiers {
      margin-top: 16px
    }

    .tier {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0
    }

    .tier+.tier {
      border-top: 1px solid var(--line)
    }

    .chip {
      background: var(--card2);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 15px;
      cursor: pointer;
    }

    .chip:active {
      transform: scale(.96)
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px
    }

    button.act {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 13px 0;
      font-size: 15px;
      font-weight: 600;
      color: #0c1024;
      cursor: pointer;
    }

    .b-again {
      background: var(--again)
    }

    .b-good {
      background: var(--good)
    }

    .b-easy {
      background: var(--easy)
    }

    .b-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line)
    }

    .b-show {
      background: var(--accent);
      color: #0c1024
    }

    .small {
      font-size: 12px;
      color: var(--muted)
    }

    .done {
      text-align: center;
      padding: 50px 20px
    }

    .done .big {
      font-size: 46px
    }

    .done h2 {
      margin: 10px 0
    }

    .done p {
      color: var(--muted);
      line-height: 1.6
    }

    nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--line);
    }

    nav.hidden {
      display: none;
    }

    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 12px 0 14px;
      font-size: 12px;
      cursor: pointer;
    }

    nav button.on {
      color: var(--accent)
    }

    nav button .ic {
      display: block;
      font-size: 20px;
      margin-bottom: 2px
    }

    .concept {
      padding: 14px 4px;
      border-bottom: 1px solid var(--line)
    }

    .concept .ch {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px
    }

    .concept .cth {
      font-size: 17px;
      font-weight: 600
    }

    .concept .cpos {
      font-size: 12px;
      color: var(--muted);
      font-style: italic
    }

    .concept .cw {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6
    }

    .concept .due {
      font-size: 11px;
      color: var(--accent)
    }
  </style>
</head>

  <script>
    // Vokab - Vocabulary Learning App
// Offline-first spaced repetition flashcards for language learning

// ====== Config ======
const PROFILE_NAMES = ["Nesta", "Pordee", "Non", "Poom", "Modi", "Raymond"];
const CLOUD_CFG_KEY = "vokab.cloud";
const CLOUD_DEFAULT = {
  url: "https://slpnksjbtkmwrwanzcdo.supabase.co",
  key: "sb_publishable_qsGTPjzn3NKqeBIJ69Ua8Q_dmxD79md"
};
const DAY = 86400000;

// ====== State ======
let activeName = localStorage.getItem("vokab.active") || null;
if (activeName && !PROFILE_NAMES.includes(activeName)) activeName = null;

let DB = activeName ? load() : null;
let currentPack = activeName ? (localStorage.getItem('vokab.pack') || Object.keys(PACKS)[0]) : null;
let view = 'study';
let revealed = false;
let current = null;
let studyMode = localStorage.getItem('vokab.mode') || 'mode1';
let STUDY_SAY = [];
let pushT = null;

// ====== Utils ======
const esc = (s) => (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
// Safe to drop inside a single-quoted JS string that lives in an HTML attribute
// (e.g. onclick="fn('...')"). Escapes backslash/quote for JS, then & < > " for HTML.
const jsAttr = (s) => String(s)
  .replace(/\\/g, '\\\\').replace(/'/g, "\\'")
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const disp = (w) => (w == null ? '' : String(w)).replace(/'(?!s\b)/g, '');
const say = (w) => (w == null ? '' : String(w)).replace(/'/g, '').replace(/\([^)]*\)/g, '').replace(/[=].*$/, '')
  .replace(/\+/g, '').replace(/[\/]/g, ' ').replace(/\s+/g, ' ').trim();
const cryptoId = () => Math.random().toString(36).slice(2, 10);
const dataKey = () => "vokab.v2." + activeName;

// ====== Storage ======
function load() {
  let s = localStorage.getItem(dataKey());
  if (s) {
    try {
      const db = JSON.parse(s);
      if (db && db.cards) { syncPacks(db); return db; }
    } catch (e) { }
  }
  const db = { cards: [], created: Date.now(), updated: 0 };
  syncPacks(db);
  // Persist WITHOUT bumping `updated` — a brand-new empty deck must stay
  // "older" than any cloud copy so a pull can win and not clobber progress.
  localStorage.setItem(dataKey(), JSON.stringify(db));
  return db;
}

function save(db) {
  if (!activeName) return;
  db.updated = Date.now();
  localStorage.setItem(dataKey(), JSON.stringify(db));
  schedulePush();
}

function toCard(e, pack) {
  return {
    id: cryptoId(), pack, th: e.th, pos: e.pos || "", groups: e.groups || [],
    definition: e.definition || "", example: e.example || "",
    ease: 2.5, interval: 0, reps: 0, due: Date.now(), lapses: 0
  };
}

function syncPacks(db) {
  for (const pack in PACKS) {
    for (const e of PACKS[pack]) {
      const has = db.cards.some(c => c.pack === pack && c.th === e.th);
      if (!has) {
        db.cards.push(toCard(e, pack));
      } else {
        const c = db.cards.find(c => c.pack === pack && c.th === e.th);
        c.pos = e.pos || "";
        c.groups = e.groups || [];
        c.definition = e.definition || "";
        c.example = e.example || "";
      }
    }
  }
}

// Migration: old flat "vokab.v2" → first fixed profile
(function() {
  const old = localStorage.getItem("vokab.v2");
  if (old != null) {
    const first = PROFILE_NAMES[0];
    if (!localStorage.getItem("vokab.v2." + first)) {
      localStorage.setItem("vokab.v2." + first, old);
    }
    localStorage.removeItem("vokab.v2");
  }
})();

// ====== Spaced Repetition (SM-2) ======
function schedule(card, rating) {
  card.reps++;
  if (rating === 'again') {
    card.lapses++;
    card.interval = 0;
    card.ease = Math.max(1.3, card.ease - 0.2);
    card.due = Date.now() + 60 * 1000;
  } else if (rating === 'good') {
    if (card.interval === 0) card.interval = 1;
    else if (card.interval === 1) card.interval = 3;
    else card.interval = Math.round(card.interval * card.ease);
    card.due = Date.now() + card.interval * DAY;
  } else {
    card.ease += 0.15;
    card.interval = card.interval === 0 ? 4 : Math.round(card.interval * card.ease * 1.3);
    card.due = Date.now() + card.interval * DAY;
  }
  save(DB);
}

function packCards(pack) {
  return DB.cards.filter(c => c.pack === pack);
}

function dueCards(pack) {
  const now = Date.now();
  return packCards(pack).filter(c => c.due <= now).sort((a, b) => a.due - b.due);
}

// ====== Audio ======
function speak(text) {
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch (e) { }
}

function speakWord(i) {

}

// ====== Cloud Sync (Supabase) ======
function cloudCfg() {
  try {
    const c = JSON.parse(localStorage.getItem(CLOUD_CFG_KEY));
    if (c && c.url && c.key) return c;
  } catch (e) { }
  return CLOUD_DEFAULT;
}

function cloudOn() {
  const c = cloudCfg();
  return !!(c.url && c.key);
}

function cloudHeaders(extra) {
  const c = cloudCfg();
  return Object.assign({
    apikey: c.key,
    Authorization: "Bearer " + c.key
  }, extra || {});
}

function restBase() {
  return cloudCfg().url.replace(/\/+$/, '').replace(/\/rest\/v1$/, '') + "/rest/v1/vokab_profiles";
}

// fetch with an abort timeout so a hung connection can never freeze the UI
function fetchT(url, opts, ms) {
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), ms || 8000);
  return fetch(url, Object.assign({ signal: ctl.signal }, opts))
    .finally(() => clearTimeout(t));
}

async function cloudPull(name) {
  if (!cloudOn()) return null;
  try {
    const url = restBase() + "?name=eq." + encodeURIComponent(name) + "&select=data";
    const r = await fetchT(url, { headers: cloudHeaders() });
    if (!r.ok) return null;
    const rows = await r.json();
    return (rows && rows[0] && rows[0].data) || null;
  } catch (e) {
    return null;
  }
}

async function cloudPush(name, data) {
  if (!cloudOn()) return false;
  try {
    const r = await fetchT(restBase(), {
      method: "POST",
      headers: cloudHeaders({ "Content-Type": "application/json", Prefer: "resolution=merge-duplicates" }),
      body: JSON.stringify({ name, data })
    });
    return r.ok;
  } catch (e) {
    return false;
  }
}

function schedulePush() {
  if (!cloudOn() || !activeName) return;
  clearTimeout(pushT);
  const name = activeName, snap = DB;
  pushT = setTimeout(() => {
    if (snap) cloudPush(name, snap);
  }, 800);
}

function renderStudy() {

    const aIsNew = a.reps === 0;

        backText = `<div style="margin-bottom:8px"><strong>English:</strong> ${words.map(w => esc(disp(w))).join(', ')}</div>${def}`;
      } else if (studyMode === 'mode3') {
        frontText = firstWord;
        const example = c.example ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)"><strong>Example:</strong><div style="margin-top:4px;font-style:italic;color:var(--muted)">"${esc(c.example)}"</div></div>` : '';
        backText = `<div style="margin-bottom:8px"><strong>Definition:</strong> ${esc(c.definition || c.th)}</div><div style="margin-bottom:8px"><strong>Similar:</strong> ${words.map(w => esc(disp(w))).join(', ')}</div>${example}`;
      }

      return `<div class="concept" onclick="toggleWordDef(${idx})">
        <div class="ch"><div class="cth">${esc(frontText)} <span class="cpos">${esc(c.pos)}</span></div>
          <div class="due">${dueTxt}</div></div>
        <div class="cw" id="words-${idx}" style="cursor:pointer;display:block">${esc(frontText)}</div>
        <div id="def-${idx}" style="display:none;margin-top:8px;padding:8px;background:var(--card2);border-radius:8px;font-size:13px;color:var(--muted);line-height:1.6">${backText}</div>
      </div>`;
    }).join('');
}

function toggleWordDef(idx) {
  const defEl = document.getElementById('def-' + idx);
  const wordsEl = document.getElementById('words-' + idx);
  const isHidden = defEl.style.display === 'none';

  defEl.style.display = isHidden ? 'block' : 'none';
  wordsEl.style.display = isHidden ? 'none' : 'block';
}

// ====== Init ======
render();

  </script>
</body>
