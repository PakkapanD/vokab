<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Vokab — Vocab by P'N</title>
  <style>
    :root {
      --bg: #0f1220;
      --card: #1a1f35;
      --card2: #232a45;
      --ink: #eef1ff;
      --muted: #9aa3c7;
      --accent: #7c83ff;
      --good: #34d399;
      --easy: #22d3ee;
      --again: #fb7185;
      --line: #2c3358;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      height: 100%
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100%;
      display: flex;
      flex-direction: column
    }

    header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: linear-gradient(var(--bg), rgba(15, 18, 32, .85));
      backdrop-filter: blur(6px);
      z-index: 5;
      gap: 10px;
    }

    header h1 {
      font-size: 20px;
      margin: 0;
      letter-spacing: .5px;
      flex-shrink: 0;
    }

    header h1 span {
      color: var(--accent)
    }

    .header-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .header-dropdown {
      position: relative;
    }

    .profile-selector {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--ink);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .profile-selector:active {
      transform: scale(.96);
    }

    main {
      flex: 1;
      padding: 8px 16px 90px
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
    }

    .pack {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .pack:active {
      transform: scale(.99)
    }

    .pack .pname {
      font-size: 21px;
      font-weight: 700
    }

    .pack .pmeta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px
    }

    .pack .parrow {
      font-size: 26px;
      color: var(--accent)
    }

    .bar {
      height: 8px;
      border-radius: 99px;
      background: var(--card2);
      margin-top: 12px;
      overflow: hidden
    }

    .bar>i {
      display: block;
      height: 100%;
      background: var(--good)
    }

    .th {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: .3px;
      line-height: 1.3
    }

    .pos {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-top: 6px
    }

    .hidden {
      display: none
    }

    .reveal-hint {
      margin-top: 22px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.6
    }

    .tiers {
      margin-top: 16px
    }

    .tier {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0
    }

    .tier+.tier {
      border-top: 1px solid var(--line)
    }

    .chip {
      background: var(--card2);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 15px;
      cursor: pointer;
    }

    .chip:active {
      transform: scale(.96)
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 10px
    }

    button.act {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 13px 0;
      font-size: 15px;
      font-weight: 600;
      color: #0c1024;
      cursor: pointer;
    }

    .b-again {
      background: var(--again)
    }

    .b-good {
      background: var(--good)
    }

    .b-easy {
      background: var(--easy)
    }

    .b-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line)
    }

    .b-show {
      background: var(--accent);
      color: #0c1024
    }

    .small {
      font-size: 12px;
      color: var(--muted)
    }

    .done {
      text-align: center;
      padding: 50px 20px
    }

    .done .big {
      font-size: 46px
    }

    .done h2 {
      margin: 10px 0
    }

    .done p {
      color: var(--muted);
      line-height: 1.6
    }

    nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      background: var(--card);
      border-top: 1px solid var(--line);
    }

    nav.hidden {
      display: none;
    }

    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 12px 0 14px;
      font-size: 12px;
      cursor: pointer;
    }

    nav button.on {
      color: var(--accent)
    }

    nav button .ic {
      display: block;
      font-size: 20px;
      margin-bottom: 2px
    }

    .concept {
      padding: 14px 4px;
      border-bottom: 1px solid var(--line)
    }

    .concept .ch {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px
    }

    .concept .cth {
      font-size: 17px;
      font-weight: 600
    }

    .concept .cpos {
      font-size: 12px;
      color: var(--muted);
      font-style: italic
    }

    .concept .cw {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6
    }

    .concept .due {
      font-size: 11px;
      color: var(--accent)
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <h1>Vo<span>kab</span></h1>
      <div class="header-controls">
        <div class="header-dropdown">
          <div class="profile-selector" onclick="toggleProfileMenu()">
            <span id="current-profile">Select profile</span>
            <span style="font-size:10px">▼</span>
          </div>
          <div id="profile-dropdown" style="position:absolute;top:100%;right:auto;left:0;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-top:4px;min-width:140px;z-index:100;display:none;box-shadow:0 10px 30px rgba(0,0,0,.25)"></div>
        </div>
        <div class="header-dropdown">
          <div class="profile-selector" onclick="togglePackMenu()">
            <span id="current-pack">Select pack</span>
            <span style="font-size:10px">▼</span>
          </div>
          <div id="pack-dropdown" style="position:absolute;top:100%;right:auto;left:0;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-top:4px;min-width:140px;z-index:100;display:none;box-shadow:0 10px 30px rgba(0,0,0,.25)"></div>
        </div>
        <div class="header-dropdown">
          <div class="profile-selector" onclick="toggleModeMenu()">
            <span id="current-mode">Mode 1</span>
            <span style="font-size:10px">▼</span>
          </div>
          <div id="mode-dropdown" style="position:absolute;top:100%;right:0;left:auto;background:var(--card);border:1px solid var(--line);border-radius:8px;margin-top:4px;min-width:200px;z-index:100;display:none;box-shadow:0 10px 30px rgba(0,0,0,.25)"></div>
        </div>
      </div>
    </header>

    <main id="main"></main>

    <nav>
      <button id="nav-study" class="on" onclick="go('study')"><span class="ic">🎯</span>Study</button>
      <button id="nav-words" onclick="go('words')"><span class="ic">📚</span>Word list</button>
    </nav>
  </div>

  <script>
    /* PACKS_PLACEHOLDER */
  </script>
  <script>
    /* APP_CODE_PLACEHOLDER */
  </script>
</body>

</html>
